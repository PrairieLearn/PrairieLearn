# yaml-language-server: $schema=https://yarnpkg.com/configuration/yarnrc.json

enableGlobalCache: true

# Disable lifecycle scripts (preinstall/install/postinstall) for third-party
# dependencies. Packages that legitimately need to run install scripts (e.g.
# native modules) must be opted in via `dependenciesMeta.<pkg>.built: true`
# in package.json. This blocks the npm-registry supply-chain attack vector
# where a compromised package executes arbitrary code at install time.
enableScripts: false

# Block any transitive (or direct) git/github dependency unless its repository
# URL matches a glob in this allowlist. Closes the `enableScripts: false`
# bypass where `git:`/`github:` deps still run their pack/prepare scripts —
# the exact vector used in the @tanstack/router npm compromise.
approvedGitRepositories: []

# Refuse to install npm versions younger than this. Reduces exposure during
# fast-moving supply-chain incidents where bad releases are published and
# unpublished within hours.
npmMinimalAgeGate: 3d

nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.14.1.cjs
