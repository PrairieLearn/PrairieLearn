<pl-question-panel>
  <p>What is the typically most-limiting plant nutrient in agriculture?</p>
</pl-question-panel>
<pl-string-input
  answers-name="macronutrient"
  correct-answer="N|nitrogen"
  correct-answer-format="regex"
  remove-leading-trailing="true"
  ignore-case="true"
  aria-label="Answer">
</pl-string-input>
<pl-answer-panel>
Either <code>N</code> or <code>nitrogen</code>, leading and training whitespace accepted.
</pl-answer-panel>
