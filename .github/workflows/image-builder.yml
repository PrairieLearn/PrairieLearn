on:
  workflow_call:
    inputs:
      folder:
        description: 'Either "workspaces" or "graders"'
        required: true
        type: string
      image-prefix:
        description: 'The prefix for the image name (e.g. prairielearn/workspace)'
        required: true
        type: string
      base-images:
        description: 'The base images to build'
        required: false
        type: string
        default: '[]'
      images:
        description: 'The images to build'
        required: true
        type: string
      exclude:
        description: 'The combinations to exclude'
        required: false
        type: string
        default: '[]'

jobs:
  build-base-images:
    strategy:
      max-parallel: 5
      matrix:
        image: ${{ fromJSON(inputs.base-images) }}
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        exclude: ${{ fromJSON(inputs.exclude) }}
    runs-on: ${{ matrix.os }}
    env:
      CAN_PUSH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' && github.ref_name == github.event.repository.default_branch }}
    steps:
      # Checkout the repository with full depth so we can check if the workspace was modified
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether ${{ inputs.folder }}/${{ matrix.image }} was modified
        id: check-modified
        run: |
          scripts/check_path_modified.sh ${{ inputs.folder }}/${{ matrix.image }} ${{ inputs.folder }}_${{ matrix.image }}_modified

      - name: Set up Docker Buildx
        # Currently, we need this 'if' on each step. https://github.com/orgs/community/discussions/82744
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ steps.check-modified.outputs.was-modified == 'true' && env.CAN_PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set docker tags and labels
        id: meta
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            ${{ inputs.image-prefix }}-${{ matrix.image }}
          # On the default branch, we'll also tag the image as `latest`
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long

      - name: Build ${{ (env.CAN_PUSH_IMAGE == 'true' && 'and push') || '' }}
        id: build
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.folder }}/${{ matrix.image }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ env.CAN_PUSH_IMAGE == 'true' }}
          outputs: |
            type=docker,dest=${{ runner.temp }}/${{ matrix.image }}-${{ matrix.os }}.tar

      # We will upload the artifact so we can use it in the next job
      - name: Upload artifact
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-${{ matrix.os }}-tarball
          path: ${{ runner.temp }}/${{ matrix.image }}-${{ matrix.os }}.tar
          if-no-files-found: error
          retention-days: 1

  build-images:
    needs: [build-base-images]
    strategy:
      max-parallel: 5
      matrix:
        image: ${{ fromJSON(inputs.images) }}
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        exclude: ${{ fromJSON(inputs.exclude) }}
    runs-on: ${{ matrix.os }}
    env:
      CAN_PUSH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' && github.ref_name == github.event.repository.default_branch }}

    # Associate each workspace with requirements
    steps:
      # Checkout the repository with full depth so we can check if the workspace was modified
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether ${{ inputs.folder }}/${{ matrix.image }} was modified
        id: check-modified
        run: |
          scripts/check_path_modified.sh ${{ inputs.folder }}/${{ matrix.image }} ${{ inputs.folder }}_${{ matrix.image }}_modified

      - name: Set up Docker Buildx
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Download artifact
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: actions/download-artifact@v4
        # Download all uploaded artifacts that match our OS
        with:
          pattern: '*-${{ matrix.os }}-tarball'
          path: ${{ runner.temp }}
          merge-multiple: true

      # This won't do anything if there are no artifacts to download (i.e. the base image didn't change)
      # Retag these loaded images as latest, so that they get used as the base image instead of
      # the one from DockerHub
      - name: Load and tag base images
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        run: |
          for file in ${{ runner.temp }}/*-${{ matrix.os }}.tar; do
            docker load -i "$file" | sed -n 's/Loaded image: //p' | while read -r tagged_image; do
              image="${tagged_image%:*}"
              docker tag "$tagged_image" "$image:latest"
            done
          done
          docker image ls -a

      - name: Set docker tags and labels
        id: meta
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/metadata-action@v5
        with:
          context: git
          images: |
            ${{ inputs.image-prefix }}-${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long

      - name: Build ${{ (env.CAN_PUSH_IMAGE == 'true' && 'and push') || '' }}
        id: build
        if: ${{ steps.check-modified.outputs.was-modified == 'true' }}
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: ${{ inputs.folder }}/${{ matrix.image }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ env.CAN_PUSH_IMAGE == 'true' }}

      - name: Sleep before retrying
        if: steps.build.outcome == 'failure'
        run: sleep 10

      - name: Retry build ${{ (env.CAN_PUSH_IMAGE == 'true' && 'and push') || '' }}
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.folder }}/${{ matrix.image }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          push: ${{ env.CAN_PUSH_IMAGE == 'true' }}
