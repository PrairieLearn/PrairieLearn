name: Test

on:
  push:
    branches:
      - master
      # Build on all code freeze branches since we will deploy from them.
      - '**-code-freeze'
  pull_request:
  merge_group:

concurrency:
  # Ensure that we only run one concurrent job for Pull Requests. This ensures
  # that someone can't kill our throughput by pushing a bunch of commits to a
  # single branch in rapid succession.
  #
  # However, for master builds, we allow maximum concurrency. This is achieved
  # because `github.head_ref` isn't defined there, and `github.run_id` is
  # globally unique in this repo.
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  test-prairielearn:
    name: Docker
    runs-on: ubuntu-latest

    env:
      # Secrets aren't accessible for PRs coming from forks, and we also can't
      # check secrets in an `if` conditional, so we check for the presence of
      # the secret here and use this value in conditionals below.
      CAN_PUSH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          # We need the whole history so we can diff against `master` to determine
          # what images need to be built.
          fetch-depth: 0
          fetch-tags: false
          show-progress: false

      # We won't try to push in this job, but we still authenticate if the
      # secrets are available so that we don't hit image pull rate limits.
      - name: Login to DockerHub
        if: ${{ env.CAN_PUSH_IMAGE == 'true'}}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the prairielearn docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: prairielearn/prairielearn:${{ env.COMMIT_SHA }}
          cache-from: type=registry,ref=prairielearn/prairielearn:buildcache-linux-amd64

      # We run the following steps in this job instead of separately to avoid the
      # overhead of pulling the image another time.

      - name: Tag prairielearn image as latest for executor build
        run: docker tag prairielearn/prairielearn:${{ env.COMMIT_SHA }} prairielearn/prairielearn:latest

      - name: Build the executor docker image
        run: docker build -t prairielearn/executor:latest ./images/executor

      - name: Run executor smoke test
        run: |
          docker run --rm prairielearn/executor:latest \
            yarn workspace @prairielearn/prairielearn run test:executor-smoke-test
        timeout-minutes: 5

      - name: Create a temporary directory for host files
        run: mkdir -p /tmp/prairielearn
      - name: Start the container
        # We have tests for external grading code, which relies on the Docker
        # socket being available, as well as a specific volume mount and
        # environment variable. See the docs for more details:
        # https://docs.prairielearn.com/externalGrading/#running-locally-for-development
        #
        # We put the Postgres data on a tmpfs volume, which should be much faster.
        run: |
          docker run --tty --detach \
          --volume /var/run/docker.sock:/var/run/docker.sock \
          --volume /tmp/prairielearn:/jobs \
          --tmpfs=/var/postgres \
          --env HOST_JOBS_DIR=/tmp/prairielearn \
          --name=test_container \
          prairielearn/prairielearn:${{ env.COMMIT_SHA }} /bin/bash
      - name: Run the JavaScript tests
        run: docker exec --env GITHUB_ACTIONS=true test_container sh -c "make -s -C /PrairieLearn test-prairielearn-docker-smoke-tests"
        # The JS tests hang relatively often when someone makes a mistake in a PR,
        # and the GitHub Actions default timeout is 6 hours, so the CI run keeps
        # spinning until it eventually times out. This shorter timeout helps
        # ensure that the tests fail more quickly so that people can fix them.
        timeout-minutes: 30

  test-prairielearn-vitest:
    name: Vitest (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5, 6]
        shardTotal: [6]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CAN_LOGIN_TO_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' }}
      PGHOST: localhost
      REDIS_HOST: localhost

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      # Authenticate with Docker Hub to avoid image pull rate limits
      # during external grading tests.
      - name: Login to DockerHub
        if: ${{ env.CAN_LOGIN_TO_DOCKERHUB == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: ./.github/actions/native-test-setup

      - name: Vitest suite
        run: |
          make start-support
          yarn test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          SHARDED_TESTS: true

      - name: Upload Vitest blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  test-prairielearn-playwright:
    name: Playwright (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CAN_LOGIN_TO_DOCKERHUB: ${{ secrets.DOCKERHUB_USERNAME != '' }}
      PGHOST: localhost
      REDIS_HOST: localhost

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Login to DockerHub
        if: ${{ env.CAN_LOGIN_TO_DOCKERHUB == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: ./.github/actions/native-test-setup
        with:
          install-playwright-browsers: 'true'

      - name: Playwright suite
        run: |
          make start-support
          yarn workspace @prairielearn/prairielearn run test:e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-blob-report-${{ matrix.shardIndex }}
          path: apps/prairielearn/test-results/blob-report/*
          include-hidden-files: true
          retention-days: 1

  merge-native-test-reports:
    name: Native (merge test reports)
    if: ${{ !cancelled() }}
    needs: [test-prairielearn-vitest, test-prairielearn-playwright]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'
      - name: Set up Yarn
        # We only install the dependencies in the root workspace to avoid
        # installing dependencies that won't be used.
        # Note that this means playwright is installed in the root workspace, not the prairielearn workspace.
        run: yarn workspaces focus prairielearn
      - name: Download Vitest blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v8
        with:
          path: .vitest-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge Vitest reports
        run: yarn vitest --watch=false --merge-reports --coverage
      - name: Download Playwright blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v8
        with:
          path: apps/prairielearn/test-results/blob-report
          pattern: playwright-blob-report-*
          merge-multiple: true
      - name: Merge Playwright reports
        run: yarn playwright merge-reports --reporter html,github apps/prairielearn/test-results/blob-report
      - name: Upload JavaScript coverage report to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: javascript
      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 7
      # The merge-reports command always exits with 0, so we need to check if
      # the test jobs succeeded and fail this job if they didn't.
      - name: Fail if tests failed
        if: ${{ needs.test-prairielearn-vitest.result != 'success' || needs.test-prairielearn-playwright.result != 'success' }}
        run: exit 1
