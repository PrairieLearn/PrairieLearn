# This workflow uses `pull_request_target` to run in the base repository context,
# which grants access to secrets needed for the GitHub App token. This is necessary
# because Dependabot-triggered workflows have restricted secret access.
#
# Security considerations:
# - Only runs when github.actor is dependabot[bot], preventing abuse from forks

name: 'Dedupe Dependabot PRs'

on:
  pull_request_target:
    branches:
      - master
    paths:
      - 'pnpm-lock.yaml'

jobs:
  dedupe:
    name: 'Dedupe dependencies'
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: 'Configure Git'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 'Dedupe dependencies'
        run: pnpm dedupe

      - name: 'Commit and push changes'
        run: |
          git add .
          git commit -m 'Dedupe dependencies' || true
          git push

      # While dependabot uses hash versions for GitHub Actions if the action is
      # pinned to a hash, it will not include the comment with the corresponding
      # tag in the format used by our script. Therefore, we run the script to
      # add the comment after deduping.
      - name: 'Pin GitHub Actions'
        run: make format-actions-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Commit and push changes'
        run: |
          git add .
          git commit -m 'Pin GitHub Actions' || true
          git push
