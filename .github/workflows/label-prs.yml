name: 'Label PRs'
on:
  - pull_request_target

jobs:
  label-by-changes:
    name: 'PR changes'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          sync-labels: false
  # labeler cannot label PRs by title: https://github.com/actions/labeler/issues/55
  label-by-title:
    # To prevent labeler from removing labels added by this job, it should run beforehand.
    needs: [label-by-changes]
    name: 'PR title'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: fuxingloh/multi-labeler@b15a54460c38f54043fa75f7b08a0e2aa5b94b5b # v4.0.0
        with:
          config-path: .github/title-labeler.yml
