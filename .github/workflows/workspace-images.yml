on:
  workflow_call:

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
jobs:
  build-workspace-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [desktop, jupyterlab, jupyterlab-python, rstudio, xtermjs, vscode-python]
    env:
      CAN_PUSH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.CAN_PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check whether workspaces/${{ matrix.workspace }} was modified
        run: |
          tools/check_path_modified.sh workspaces/${{ matrix.workspace }} workspaces_${{ matrix.workspace }}_modified

      - name: Build and push prairielearn/workspace-${{ matrix.workspace }}
        if: env[format('workspaces_{0}_modified', matrix.grader)] == 'true'
        uses: docker/build-push-action@v6
        with:
          context: workspaces/${{ matrix.workspace }}
          platforms: linux/amd64,linux/arm64
          push: ${{ env.CAN_PUSH_IMAGE == 'true' }}
          no-cache: true
          tags: prairielearn/workspace-${{ matrix.workspace }}:${{ env.COMMIT_SHA }}
